<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – eManuntung</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0f172a;
  --blue: #1d4ed8;
  --sky: #38bdf8;
  --indigo: #6366f1;
  --gray: #64748b;
  --error: #ef4444;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url('balai-kota.png') center/cover no-repeat fixed;
  display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
}

/* Grid pattern sama kayak hero */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
}

.wrapper {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr;
  max-width: 900px; width: 100%; border-radius: 24px; overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
}

/* ===== KIRI ===== */
.left {
  background: rgba(10, 30, 80, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.08);
  padding: 48px 40px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}

.left::before {
  content: ''; position: absolute; top: -100px; right: -100px;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.left::after {
  content: ''; position: absolute; bottom: -80px; left: -80px;
  width: 250px; height: 250px; border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.brand { display: flex; align-items: center; gap: 12px; }

.brand-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; font-weight: 700; color: white;
}

.brand-name span {
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.left-body { margin-top: 48px; }

.left-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px; font-weight: 700;
  color: white; line-height: 1.25; margin-bottom: 12px;
}

.left-title .accent {
  background: linear-gradient(90deg, #38bdf8, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.left-desc { color: rgba(255,255,255,0.5); font-size: 13.5px; line-height: 1.7; }

.left-features { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }

.feat-item { display: flex; align-items: center; gap: 12px; }

.feat-dot {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}

.feat-text { color: rgba(255,255,255,0.6); font-size: 13px; }

.left-footer { color: rgba(255,255,255,0.2); font-size: 11px; }

/* ===== KANAN ===== */
.right {
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px);
  padding: 48px 44px;
  display: flex; flex-direction: column; justify-content: center;
}

.form-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--sky); text-transform: uppercase; margin-bottom: 8px;
}

.form-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 26px; font-weight: 700; color: var(--navy); margin-bottom: 6px;
}

.form-sub { font-size: 13px; color: var(--gray); margin-bottom: 28px; }

.form-group { margin-bottom: 16px; }

.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }

.input-wrap { position: relative; }

.form-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid #e2e8f0; border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; color: var(--navy);
  background: #f8faff; outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}

.form-input:focus {
  border-color: var(--sky);
  box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
  background: white;
}

.form-input.error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
.form-input.has-toggle { padding-right: 44px; }

.toggle-pw {
  position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 16px;
  color: var(--gray); padding: 0;
}

.error-msg { font-size: 12px; color: var(--error); margin-top: 5px; display: none; }
.error-msg.show { display: block; }

.form-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}

.checkbox-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.checkbox-wrap input { accent-color: var(--indigo); width: 15px; height: 15px; }
.checkbox-label { font-size: 13px; color: var(--gray); }

.forgot-link {
  font-size: 13px; color: var(--indigo); text-decoration: none; font-weight: 600;
}
.forgot-link:hover { text-decoration: underline; }

.btn-login {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--sky), var(--indigo));
  color: white; border: none; border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(56,189,248,0.35);
  transition: transform .2s, box-shadow .2s, opacity .2s;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(56,189,248,0.45);
}

.btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }
.btn-login .spinner {
  display: none; width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
  border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto;
}
.btn-login.loading .btn-text { display: none; }
.btn-login.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: #cbd5e1; font-size: 12px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

.back-link { text-align: center; margin-top: 14px; font-size: 13px; color: var(--gray); }
.back-link a { color: var(--indigo); font-weight: 700; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }

/* Success screen */
.success-screen {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
}
.success-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--sky), var(--indigo));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin: 0 auto 20px;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.success-title { font-family: 'Space Grotesk',sans-serif; font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.success-sub { font-size: 14px; color: var(--gray); margin-bottom: 24px; line-height: 1.6; }
.success-countdown { font-size: 12px; color: var(--gray); }
.success-countdown span { color: var(--indigo); font-weight: 700; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--navy); color: white; border-radius: 12px;
  padding: 12px 22px; font-size: 13px; font-weight: 600;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 999;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.is-error { background: var(--error); }

@media (max-width: 680px) {
  .wrapper { grid-template-columns: 1fr; border-radius: 20px; }
  .left { display: none; }
  .right { padding: 36px 24px; border-radius: 20px; }
}

</style>
